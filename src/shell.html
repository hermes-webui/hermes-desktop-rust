<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="shared/shell.css" />
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      #strip {
        display: flex;
        align-items: center;
        gap: 4px;
        height: 38px;
        padding: 0 6px;
        background: var(--hermes-bg);
        user-select: none;
      }
      #tabs {
        display: flex;
        align-items: center;
        gap: 4px;
        overflow: hidden;
        flex: 0 1 auto;
      }
      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 28px;
        padding: 0 8px 0 12px;
        border-radius: 6px;
        max-width: 190px;
        min-width: 72px;
        cursor: default;
        color: var(--hermes-fg-secondary);
        background: transparent;
        border: 1px solid transparent;
        flex: 1 1 auto;
        overflow: hidden;
      }
      .tab:hover {
        background: var(--hermes-control-bg);
      }
      .tab.active {
        background: var(--hermes-control-bg);
        border-color: var(--hermes-border);
        color: var(--hermes-fg);
      }
      .tab .t {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 12px;
      }
      /* Inline rename input (issue #7) */
      .tab input.rename {
        flex: 1;
        min-width: 0;
        font: 12px inherit;
        font-family: inherit;
        color: var(--hermes-fg);
        background: var(--hermes-bg);
        border: 1px solid var(--hermes-accent, #0a84ff);
        border-radius: 4px;
        padding: 1px 4px;
        margin: 0;
        outline: none;
      }
      /* Attention dot: a tab whose session has a pending approval/clarify
         popup waiting on the user (issue #14). */
      .tab .attn {
        flex: none;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ff9f0a;
        box-shadow: 0 0 0 2px rgba(255, 159, 10, 0.35);
      }
      .tab.attention {
        color: var(--hermes-fg);
      }
      .tab.attention:not(.active) {
        background: rgba(255, 159, 10, 0.12);
      }
      /* Per-tab profile dot (issue #8): a colored dot keyed to the tab's active
         WebUI profile, so multiple profiles open at once are tellable apart.
         Hidden for the default profile (no dot = default). */
      .tab .pf {
        flex: none;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25);
      }
      /* Drag-to-reorder (issue #19) */
      .tab.dragging {
        opacity: 0.45;
      }
      .tab.drop-before {
        box-shadow: inset 2px 0 0 0 var(--hermes-accent, #0a84ff);
      }
      .tab.drop-after {
        box-shadow: inset -2px 0 0 0 var(--hermes-accent, #0a84ff);
      }
      .tab .x {
        flex: none;
        width: 18px;
        height: 18px;
        line-height: 16px;
        text-align: center;
        border-radius: 4px;
        font-size: 13px;
        opacity: 0;
        border: none;
        background: transparent;
        color: inherit;
        padding: 0;
      }
      .tab:hover .x,
      .tab.active .x {
        opacity: 0.6;
      }
      .tab .x:hover {
        opacity: 1;
        background: var(--hermes-border);
      }
      .iconbtn {
        flex: none;
        width: 28px;
        height: 28px;
        border: none;
        background: transparent;
        border-radius: 6px;
        font-size: 15px;
        color: var(--hermes-fg-secondary);
        padding: 0;
      }
      .iconbtn:hover {
        background: var(--hermes-control-bg);
        color: var(--hermes-fg);
      }
      .spacer {
        flex: 1 1 0;
      }
      #status {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 11px;
        color: var(--hermes-fg-secondary);
        padding: 0 8px;
        white-space: nowrap;
      }
      #dot {
        width: 9px;
        height: 9px;
        border-radius: 5px;
        background: #8e8e93;
        flex: none;
      }
      #reconnect {
        display: none;
        font-size: 11px;
        padding: 2px 10px;
      }
    </style>
  </head>
  <body>
    <div id="strip">
      <div id="tabs"></div>
      <button class="iconbtn" id="newtab" title="New Tab (Ctrl+T)">+</button>
      <div class="spacer" data-tauri-drag-region></div>
      <div id="status">
        <span id="dot"></span><span id="stext">Connecting…</span>
      </div>
      <button id="reconnect">Reconnect</button>
      <button class="iconbtn" id="menubtn" title="Menu — windows, zoom, preferences…">···</button>
    </div>
    <script src="shared/shell.js"></script>
    <script>
      const WIN = window.__HERMES_WIN || "";
      let boot = { mode: "direct", target: "" };
      let tunnel = null; // {state, host, port}
      let healthy = true;
      let dragFrom = -1; // index of the tab being dragged (#19)
      let dragLabel = ""; // label of the tab being dragged
      let renaming = false; // a rename input is open (#38) — suppress rebuilds
      let renamingLabel = null; // the tab label being renamed (#38)
      let lastSnapshot = null; // most recent tabs snapshot, to re-apply after edit

      // Stable color for a profile name → its dot (issue #8). Every profile —
      // the default included (v0.6.3) — maps to its own color, so all tabs on
      // one profile share a color and distinct profiles get distinct colors.
      function profileColor(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
        return "hsl(" + (h % 360) + ", 62%, 55%)";
      }

      function clearDropMarks() {
        document
          .querySelectorAll(".tab.drop-before, .tab.drop-after")
          .forEach((el) => el.classList.remove("drop-before", "drop-after"));
      }

      // Inline tab rename (issue #7): swap the title span for an input.
      function startRename(el, titleSpan, tabLabel, current) {
        if (el.querySelector("input.rename")) return;
        renaming = true; // suppress strip rebuilds until the edit ends (#38)
        renamingLabel = tabLabel;
        const input = document.createElement("input");
        input.className = "rename";
        input.value = current;
        el.replaceChild(input, titleSpan);
        input.focus();
        input.select();
        let done = false;
        const finish = (save) => {
          if (done) return;
          done = true;
          renaming = false;
          renamingLabel = null;
          if (save) {
            // Empty/whitespace clears the custom name (backend reverts to title).
            hermes.invoke("tab_rename", {
              window: WIN,
              tab: tabLabel,
              name: input.value,
            });
            // backend emits tabs-changed → renderTabs rebuilds with the new name.
          }
          // Re-apply the latest snapshot now so the input is replaced at once
          // (and any snapshot that arrived while editing is reflected). On save,
          // the backend's tabs-changed then repaints the new name.
          if (lastSnapshot) renderTabs(lastSnapshot);
        };
        input.addEventListener("keydown", (e) => {
          e.stopPropagation();
          if (e.key === "Enter") {
            e.preventDefault();
            finish(true);
          } else if (e.key === "Escape") {
            e.preventDefault();
            finish(false);
          }
        });
        input.addEventListener("blur", () => finish(true));
        input.addEventListener("click", (e) => e.stopPropagation());
        input.addEventListener("dblclick", (e) => e.stopPropagation());
      }

      function renderTabs(snapshot) {
        if (snapshot.window !== WIN) return;
        lastSnapshot = snapshot;
        // Don't rebuild the strip while a rename input is open (issue #38): the
        // active tab's document-title churn fires `tabs-changed` every couple
        // seconds, and a rebuild (`root.textContent = ""`) would destroy the
        // freshly-opened <input> — "appears then vanishes instantly" on Windows.
        // The edit re-applies the latest snapshot when it finishes.
        //
        // Exception: if the tab being renamed is no longer in the snapshot (it
        // was closed mid-edit), release the rename and fall through to rebuild
        // — otherwise the orphaned <input> would linger on a now-gone tab.
        if (renaming && document.querySelector("#tabs input.rename")) {
          if (snapshot.tabs.some((t) => t.label === renamingLabel)) return;
          renaming = false;
          renamingLabel = null;
        }
        const root = document.getElementById("tabs");
        root.textContent = "";
        snapshot.tabs.forEach((tab, i) => {
          const el = document.createElement("div");
          el.className =
            "tab" +
            (i === snapshot.active ? " active" : "") +
            (tab.attention ? " attention" : "");
          el.draggable = true;
          el.dataset.index = i;
          // The dot is driven solely by the page-reported active-profile name
          // (#31), which is authoritative: EVERY tab shows a dot colored by its
          // current profile — the default profile included (v0.6.3) — and it
          // recolors when the tab's profile changes. (We deliberately do NOT
          // fall back to `tab.profile`, the cookie value, which is empty for a
          // tab on its starting profile and so would miss tabs; `tab.profile`
          // is kept only for restore re-seeding.) On Win/Linux the reporter
          // always runs, so the dot is populated within a load; this code path
          // never runs on macOS.
          const prof = tab.dot_profile;
          const profLabel = prof ? " · profile: " + prof : "";
          el.title =
            (tab.attention
              ? (tab.title || "New Tab") + " — waiting for you"
              : tab.title || "New Tab") + profLabel;
          if (tab.attention) {
            const dot = document.createElement("span");
            dot.className = "attn";
            dot.setAttribute("aria-label", "waiting for you");
            el.appendChild(dot);
          } else if (prof) {
            const pf = document.createElement("span");
            pf.className = "pf";
            pf.style.background = profileColor(prof);
            pf.setAttribute("aria-label", "profile: " + prof);
            el.appendChild(pf);
          }
          const t = document.createElement("span");
          t.className = "t";
          t.textContent = tab.title || "New Tab";
          // Double-click the title to rename the tab (issue #7).
          t.addEventListener("dblclick", (e) => {
            e.stopPropagation();
            startRename(el, t, tab.label, tab.title || "");
          });
          const x = document.createElement("button");
          x.className = "x";
          x.textContent = "×";
          x.title = "Close Tab (Ctrl+W)";
          x.addEventListener("click", (e) => {
            e.stopPropagation();
            hermes.invoke("tab_close", { window: WIN, tab: tab.label });
          });
          el.appendChild(t);
          el.appendChild(x);
          el.addEventListener("click", () =>
            hermes.invoke("tab_select", { window: WIN, tab: tab.label })
          );
          el.addEventListener("auxclick", (e) => {
            if (e.button === 1)
              hermes.invoke("tab_close", { window: WIN, tab: tab.label });
          });

          // Drag-to-reorder (issue #19).
          el.addEventListener("dragstart", (e) => {
            dragFrom = i;
            dragLabel = tab.label;
            el.classList.add("dragging");
            if (e.dataTransfer) e.dataTransfer.effectAllowed = "move";
          });
          el.addEventListener("dragend", () => {
            dragFrom = -1;
            el.classList.remove("dragging");
            clearDropMarks();
          });
          el.addEventListener("dragover", (e) => {
            if (dragFrom < 0 || dragFrom === i) return;
            e.preventDefault();
            if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
            const r = el.getBoundingClientRect();
            const after = e.clientX > r.left + r.width / 2;
            el.classList.toggle("drop-after", after);
            el.classList.toggle("drop-before", !after);
          });
          el.addEventListener("dragleave", () =>
            el.classList.remove("drop-before", "drop-after")
          );
          el.addEventListener("drop", (e) => {
            if (dragFrom < 0 || dragFrom === i) return;
            e.preventDefault();
            const r = el.getBoundingClientRect();
            const after = e.clientX > r.left + r.width / 2;
            let to = after ? i + 1 : i;
            if (dragFrom < to) to -= 1; // removal shifts indices left
            const moved = dragLabel; // the DRAGGED tab, not this drop target
            clearDropMarks();
            if (to !== dragFrom && moved)
              hermes.invoke("tab_reorder", { window: WIN, tab: moved, index: to });
          });
          root.appendChild(el);
        });
      }

      function hostLabel(target) {
        try {
          const u = new URL(target);
          return u.host;
        } catch (e) {
          return target;
        }
      }

      function renderStatus() {
        const dot = document.getElementById("dot");
        const text = document.getElementById("stext");
        const rec = document.getElementById("reconnect");
        rec.style.display = "none";
        if (boot.mode === "ssh") {
          if (!tunnel || tunnel.state === "connecting") {
            dot.style.background = "#8e8e93";
            text.textContent = "Connecting…";
          } else if (tunnel.state === "connected") {
            dot.style.background = "#32d74b";
            text.textContent =
              "Tunnel connected · " + tunnel.host + " · port " + tunnel.port;
          } else {
            dot.style.background = "#ff453a";
            text.textContent = "Tunnel disconnected";
            rec.style.display = "inline-block";
          }
        } else {
          dot.style.background = healthy ? "#32d74b" : "#ff453a";
          text.textContent = hostLabel(boot.target);
        }
      }

      hermes.invoke("tabs_snapshot", { window: WIN }).then(renderTabs);
      hermes.invoke("get_boot_info").then((info) => {
        hermes.applyBootTheme(info);
        boot = { mode: info.mode, target: info.target };
        renderStatus();
      });
      hermes.listen("tabs-changed", (e) => renderTabs(e.payload));
      hermes.listen("tunnel-status", (e) => {
        tunnel = e.payload;
        renderStatus();
      });
      hermes.listen("health-changed", (e) => {
        healthy = !!e.payload.healthy;
        renderStatus();
      });

      document
        .getElementById("newtab")
        .addEventListener("click", () => hermes.invoke("tab_new", { window: WIN }));
      document
        .getElementById("menubtn")
        .addEventListener("click", () => hermes.invoke("strip_menu", { window: WIN }));
      document
        .getElementById("reconnect")
        .addEventListener("click", () => hermes.invoke("retry_connect"));

      // Shortcuts while the strip itself has focus (rare but free).
      document.addEventListener("keydown", (e) => {
        if (!e.ctrlKey && !e.metaKey) return;
        const k = (e.key || "").toLowerCase();
        if (k === "t") {
          e.preventDefault();
          hermes.invoke("tab_new", { window: WIN });
        } else if (k === "n") {
          e.preventDefault();
          hermes.invoke("new_window_cmd");
        } else if (k === ",") {
          e.preventDefault();
          hermes.invoke("open_preferences");
        }
      });
    </script>
  </body>
</html>
