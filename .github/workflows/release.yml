name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.extract.outputs.body }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog entry for this tag
        id: extract
        run: |
          python3 scripts/extract_changelog.py "${GITHUB_REF_NAME}" > body.md \
            || echo "See CHANGELOG.md for details." > body.md
          {
            echo "body<<CHANGELOG_EOF"
            cat body.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target universal-apple-darwin"
          - platform: windows-2022
            args: ""
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS builds a universal binary — both targets needed there.
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Tauri CLI
        run: npm install

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (minisign). Key generated 2026-06-10;
          # LOSING IT BREAKS AUTO-UPDATE for every installed copy — backups
          # live outside the repo (see RELEASING.md § updater key).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing + notarization (currently DISABLED — DMG ships
          # unsigned; README documents the Gatekeeper bypass). To enable:
          # add these repo secrets in the tauri-action format
          # (https://tauri.app/distribute/sign/macos/) and uncomment.
          # Don't pass empty org secrets — a present-but-broken
          # APPLE_CERTIFICATE makes the bundler attempt signing and fail.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hermes WebUI Desktop ${{ github.ref_name }}"
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Package portable Windows build (no installer)
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          New-Item -ItemType Directory portable | Out-Null
          Copy-Item "src-tauri/target/release/hermes-webui-desktop.exe" "portable/Hermes WebUI Desktop.exe"
          Set-Content portable/portable.txt "Portable-mode marker: keep this file next to the exe. Self-update is disabled in portable mode (download new zips from Releases). Settings/logs still live per-user under %APPDATA%/%LOCALAPPDATA%. Requires the Microsoft Edge WebView2 Runtime (preinstalled on Windows 11; https://developer.microsoft.com/microsoft-edge/webview2/)."
          $zip = "Hermes.WebUI.Desktop_${v}_windows_x64_portable.zip"
          Compress-Archive -Path portable/* -DestinationPath $zip
          gh release upload "${{ github.ref_name }}" $zip

  finalize:
    # Tester feedback: artifact names must state their platform explicitly
    # ("universal.app.tar.gz" reads as cross-platform but is mac-only).
    # Renames every asset with a platform label, then patches latest.json's
    # URLs to match so auto-update keeps working.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Rename assets with platform labels and patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Resolve the (possibly draft) release id for this tag.
          RID=$(gh api "repos/$REPO/releases" --paginate \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          [ -n "$RID" ] || { echo "no release for $TAG"; exit 1; }

          rename_of() {
            case "$1" in
              *_windows_*|*_linux_*|*_macos_*|latest.json) echo "" ;;
              *_x64-setup.exe|*_x64-setup.exe.sig) echo "${1/_x64-setup/_windows_x64-setup}" ;;
              *_x64_en-US.msi|*_x64_en-US.msi.sig) echo "${1/_x64_en-US/_windows_x64_en-US}" ;;
              *_amd64.AppImage|*_amd64.AppImage.sig) echo "${1/_amd64/_linux_x86_64}" ;;
              *_amd64.deb) echo "${1/_amd64/_linux_x86_64}" ;;
              *_universal.dmg) echo "${1/_universal/_macos_universal}" ;;
              *_universal.app.tar.gz|*_universal.app.tar.gz.sig) echo "${1/_universal/_macos_universal}" ;;
              *) echo "" ;;
            esac
          }

          MAP_FILE=$(mktemp)
          gh api "repos/$REPO/releases/$RID/assets" --paginate \
            --jq '.[] | "\(.id)\t\(.name)"' | while IFS=$'\t' read -r AID NAME; do
            NEW=$(rename_of "$NAME")
            if [ -n "$NEW" ] && [ "$NEW" != "$NAME" ]; then
              echo "rename: $NAME -> $NEW"
              gh api -X PATCH "repos/$REPO/releases/assets/$AID" -f name="$NEW" > /dev/null
              printf '%s\t%s\n' "$NAME" "$NEW" >> "$MAP_FILE"
            fi
          done

          # Patch latest.json URLs to the renamed assets.
          LJ_ID=$(gh api "repos/$REPO/releases/$RID/assets" --paginate \
            --jq '.[] | select(.name=="latest.json") | .id' | head -1)
          if [ -n "$LJ_ID" ] && [ -s "$MAP_FILE" ]; then
            gh api "repos/$REPO/releases/assets/$LJ_ID" \
              -H "Accept: application/octet-stream" > latest.json
            while IFS=$'\t' read -r OLD NEW; do
              # URL-encode spaces/dots are handled by GitHub; names here are
              # dot-separated already. Replace both raw and URL-encoded forms.
              OLD_ENC=$(printf '%s' "$OLD" | sed 's/ /%20/g')
              NEW_ENC=$(printf '%s' "$NEW" | sed 's/ /%20/g')
              sed -i "s|$OLD_ENC|$NEW_ENC|g; s|$OLD|$NEW|g" latest.json
            done < "$MAP_FILE"
            gh api -X DELETE "repos/$REPO/releases/assets/$LJ_ID" > /dev/null
            gh release upload "$TAG" latest.json --repo "$REPO"
            echo "latest.json patched:"
            grep -o '"url": *"[^"]*"' latest.json || true
          fi
